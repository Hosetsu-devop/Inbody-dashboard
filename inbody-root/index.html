<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#0B0F1A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="InBody"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.svg"/>
  <title>InBody · Jose</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#0B0F1A;color:#E2E8F0;font-family:'Inter',sans-serif}
    body{overscroll-behavior:none;-webkit-overflow-scrolling:touch}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    input:focus,textarea:focus{outline:2px solid #00D4FF;outline-offset:-1px}
    button{cursor:pointer;font-family:'Inter',sans-serif}
    button:active{opacity:.75;transform:scale(.97)}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:#0B0F1A}
    ::-webkit-scrollbar-thumb{background:#1F2D45;border-radius:2px}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    .fade{animation:fadeUp .22s ease}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    /* Layout */
    #app{display:flex;flex-direction:column;height:100vh;height:100dvh}
    #topbar{background:#131929;border-bottom:1px solid #1F2D45;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:sticky;top:0;z-index:50}
    #content{flex:1;overflow-y:auto;padding:16px 14px;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));max-width:600px;margin:0 auto;width:100%}
    #bottomnav{position:fixed;bottom:0;left:0;right:0;background:#131929;border-top:1px solid #1F2D45;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0px)}
    .navbtn{flex:1;background:none;border:none;border-top:2px solid transparent;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;color:#64748B;transition:color .15s}
    .navbtn.active{color:#00D4FF;border-top-color:#00D4FF}
    .navbtn span.icon{font-size:20px}
    .navbtn span.lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.5px}
    /* Cards */
    .card{background:#1A2236;border:1px solid #1F2D45;border-radius:16px;padding:16px}
    .card+.card,.card+.section,.section+.card{margin-top:12px}
    .section{display:flex;flex-direction:column;gap:12px}
    /* KPI grid */
    .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .kpi{background:#1A2236;border:1px solid #1F2D45;border-radius:14px;padding:10px 12px;cursor:pointer;transition:border-color .2s}
    .kpi-label{font-size:9px;color:#64748B;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
    .kpi-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700}
    .kpi-unit{font-size:9px;color:#64748B;margin-left:2px}
    /* Badges */
    .badge{font-family:'JetBrains Mono',monospace;font-size:10px;border-radius:4px;padding:1px 5px;margin-left:4px;display:inline-block}
    .badge.good{color:#22C55E;background:#22C55E22}
    .badge.bad{color:#EF4444;background:#EF444422}
    /* Form */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .form-full{grid-column:1/-1}
    label{display:block;font-size:11px;color:#64748B;margin-bottom:4px}
    input,textarea{width:100%;background:#131929;border:1px solid #1F2D45;border-radius:10px;color:#E2E8F0;font-family:'JetBrains Mono',monospace;font-size:14px;padding:10px 14px}
    textarea{resize:vertical;font-family:'Inter',sans-serif}
    /* Buttons */
    .btn{border-radius:10px;padding:11px 22px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;border:1px solid #00D4FF;color:#00D4FF;background:transparent;transition:opacity .15s}
    .btn.primary{background:#00D4FF;color:#0B0F1A}
    .btn.sm{padding:7px 14px;font-size:12px}
    .btn.danger{border-color:#EF4444;color:#EF4444}
    .btn.success{border-color:#22C55E;color:#22C55E}
    .btn.success.primary{background:#22C55E;color:#0B0F1A}
    /* Toast */
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#22C55E;color:#fff;padding:10px 22px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:13px;box-shadow:0 4px 20px #0009;white-space:nowrap;z-index:200;opacity:0;transition:all .3s;pointer-events:none}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.err{background:#EF4444}
    /* Modal */
    .modal-bg{position:fixed;inset:0;background:#000d;z-index:100;display:flex;align-items:flex-end;justify-content:center}
    .modal{background:#1A2236;border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px))}
    .modal-handle{width:40px;height:4px;background:#1F2D45;border-radius:2px;margin:0 auto 20px}
    /* Compare bars */
    .cmp-row{display:grid;grid-template-columns:80px 1fr auto;align-items:center;gap:8px;margin-bottom:8px}
    .bar-track{background:#131929;border-radius:4px;height:4px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;transition:width .4s}
    /* Chart canvas wrapper */
    .chart-wrap{position:relative;height:200px;margin-top:8px}
  </style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#00D4FF;font-weight:700;letter-spacing:1px">
      INBODY <span style="color:#64748B">· JOSE</span>
    </div>
    <div id="eval-count" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#64748B"></div>
  </div>
  <div id="content"></div>
  <nav id="bottomnav">
    <button class="navbtn active" data-view="dash" onclick="nav('dash')">
      <span class="icon">📊</span><span class="lbl">Inicio</span>
    </button>
    <button class="navbtn" data-view="chart" onclick="nav('chart')">
      <span class="icon">📈</span><span class="lbl">Gráficos</span>
    </button>
    <button class="navbtn" data-view="hist" onclick="nav('hist')">
      <span class="icon">📋</span><span class="lbl">Historial</span>
    </button>
    <button class="navbtn" data-view="add" onclick="nav('add')">
      <span class="icon">➕</span><span class="lbl">Agregar</span>
    </button>
  </nav>
</div>
<div id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const KEY = "inbody-pwa-v1";
const SEED = [
  {date:"2025-03-10",weight:91.9,muscleMass:36.7,fatMass:26.9,fatPercent:29.5,waterLiters:47.0,boneMass:4.56,bmi:29.2,visceralFat:11,bmr:1762,inBodyScore:null,notes:"Primera evaluación registrada"},
  {date:"2025-04-30",weight:91.4,muscleMass:36.8,fatMass:26.4,fatPercent:29.5,waterLiters:47.2,boneMass:4.56,bmi:29.0,visceralFat:10,bmr:1769,inBodyScore:null,notes:""},
  {date:"2025-07-07",weight:93.2,muscleMass:38.0,fatMass:26.9,fatPercent:28.3,waterLiters:48.8,boneMass:4.56,bmi:29.6,visceralFat:10,bmr:1813,inBodyScore:null,notes:"Mejor punto: mayor músculo y menor %grasa"},
  {date:"2025-08-19",weight:93.3,muscleMass:36.6,fatMass:28.8,fatPercent:30.8,waterLiters:47.1,boneMass:4.56,bmi:29.6,visceralFat:12,bmr:1766,inBodyScore:null,notes:""},
  {date:"2025-10-07",weight:92.0,muscleMass:35.9,fatMass:28.7,fatPercent:31.3,waterLiters:46.1,boneMass:4.56,bmi:29.4,visceralFat:12,bmr:1736,inBodyScore:null,notes:""},
  {date:"2025-11-27",weight:92.6,muscleMass:35.6,fatMass:30.4,fatPercent:32.0,waterLiters:45.9,boneMass:4.56,bmi:29.4,visceralFat:13,bmr:1730,inBodyScore:null,notes:""},
  {date:"2026-01-22",weight:92.0,muscleMass:34.9,fatMass:29.7,fatPercent:33.1,waterLiters:44.9,boneMass:4.56,bmi:29.2,visceralFat:13,bmr:1700,inBodyScore:null,notes:""},
  {date:"2026-03-05",weight:92.5,muscleMass:35.7,fatMass:29.2,fatPercent:31.5,waterLiters:46.2,boneMass:4.56,bmi:29.4,visceralFat:12,bmr:1738,inBodyScore:66,notes:"Mejorando desde enero"},
  {date:"2026-04-23",weight:93.2,muscleMass:36.8,fatMass:28.5,fatPercent:30.5,waterLiters:47.3,boneMass:4.58,bmi:29.6,visceralFat:11,bmr:1768,inBodyScore:69,notes:"Score 69 pts · músculo recuperado · tendencia positiva"},
];

const FIELDS = [
  {key:"weight",     label:"Peso",     unit:"kg",   color:"#00D4FF", good:"down"},
  {key:"muscleMass", label:"Músculo",  unit:"kg",   color:"#818CF8", good:"up"},
  {key:"fatMass",    label:"Grasa",    unit:"kg",   color:"#F97316", good:"down"},
  {key:"fatPercent", label:"% Grasa",  unit:"%",    color:"#F97316", good:"down"},
  {key:"waterLiters",label:"Agua",     unit:"L",    color:"#38BDF8", good:"up"},
  {key:"visceralFat",label:"Visceral", unit:"niv",  color:"#EF4444", good:"down"},
  {key:"bmi",        label:"IMC",      unit:"",     color:"#F59E0B", good:"down"},
  {key:"bmr",        label:"Metabol.", unit:"kcal", color:"#22C55E", good:"up"},
  {key:"inBodyScore",label:"Score",    unit:"pts",  color:"#22C55E", good:"up"},
];

// ── STATE ──────────────────────────────────────────────────────────────────────
let hist = [], view = "dash", chartKey = "fatPercent", editIdx = null;
let activeChart = null;

function load() {
  try {
    const r = localStorage.getItem(KEY);
    hist = r ? JSON.parse(r) : SEED;
    if (!hist.length) hist = SEED;
  } catch { hist = SEED; }
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(hist)); } catch {}
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
const fmt = (v, d=1) => (v==null||v===""||isNaN(v)) ? "—" : Number(v).toFixed(d);
function pctDiff(c, p, good) {
  if (!c||!p||isNaN(c)||isNaN(p)) return null;
  const d = ((c-p)/Math.abs(p))*100;
  return {delta:d.toFixed(1), positive: good==="up" ? d>0 : d<0};
}
const dlabel = d => new Date(d+"T12:00:00").toLocaleDateString("es-CL",{month:"short",year:"2-digit"});
const dfull  = d => new Date(d+"T12:00:00").toLocaleDateString("es-CL",{day:"numeric",month:"long",year:"numeric"});

function badge(delta, positive) {
  if (delta==null) return "";
  const n=Number(delta), arrow=n>0?"▲":n<0?"▼":"●";
  return `<span class="badge ${positive?"good":"bad"}">${arrow} ${Math.abs(n).toFixed(1)}%</span>`;
}

function project(key, months=3) {
  const pts = hist.filter(h=>h[key]!=null).map((h,i)=>({x:i,y:parseFloat(h[key])}));
  if (pts.length<2) return [];
  const n=pts.length, sx=pts.reduce((a,p)=>a+p.x,0), sy=pts.reduce((a,p)=>a+p.y,0);
  const sxy=pts.reduce((a,p)=>a+p.x*p.y,0), sx2=pts.reduce((a,p)=>a+p.x*p.x,0);
  const m=(n*sxy-sx*sy)/(n*sx2-sx*sx), b=(sy-m*sx)/n;
  const last = hist[hist.length-1];
  return Array.from({length:months},(_,i)=>{
    const dd=new Date(last.date+"T12:00:00"); dd.setMonth(dd.getMonth()+i+1);
    return {date:dd.toISOString().slice(0,10), val:parseFloat((m*(pts.length+i)+b).toFixed(1))};
  });
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
let toastT;
function showToast(msg, ok=true) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show" + (ok?"":" err");
  clearTimeout(toastT);
  toastT = setTimeout(()=>{ t.className=""; }, 3000);
}

// ── NAV ────────────────────────────────────────────────────────────────────────
function nav(v) {
  view = v;
  if (v==="add" && editIdx===null) currentForm = {...EMPTY_FORM};
  document.querySelectorAll(".navbtn").forEach(b => b.classList.toggle("active", b.dataset.view===v));
  if (activeChart) { activeChart.destroy(); activeChart=null; }
  render();
}

// ── GAUGE SVG ─────────────────────────────────────────────────────────────────
function gaugeHTML(fatPct) {
  const s=Math.min(Math.max(fatPct||20,0),45), fill=s/45;
  const col=s<18?"#F59E0B":s<25?"#22C55E":s<32?"#F59E0B":"#EF4444";
  const lbl=s<18?"Muy bajo":s<25?"Saludable":s<32?"Elevado":"Alto";
  const y=160*(1-fill);
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <svg width="60" height="124" viewBox="0 0 80 160">
      <defs>
        <clipPath id="bc"><path d="M40 6 C30 6 22 14 22 24 C22 34 28 40 28 40 L20 60 L16 100 L24 100 L26 140 L40 140 L40 6 Z M40 6 C50 6 58 14 58 24 C58 34 52 40 52 40 L60 60 L64 100 L56 100 L54 140 L40 140 L40 6 Z"/></clipPath>
        <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${col}" stop-opacity=".9"/>
          <stop offset="100%" stop-color="${col}" stop-opacity=".4"/>
        </linearGradient>
      </defs>
      <path d="M40 6 C30 6 22 14 22 24 C22 34 28 40 28 40 L20 60 L16 100 L24 100 L26 140 L40 140 L54 140 L56 100 L64 100 L60 60 L52 40 C52 40 58 34 58 24 C58 14 50 6 40 6 Z" fill="none" stroke="#1F2D45" stroke-width="2"/>
      <rect x="0" y="${y}" width="80" height="${160*fill}" fill="url(#fg)" clip-path="url(#bc)"/>
    </svg>
    <div style="font-family:'JetBrains Mono',monospace;font-size:17px;color:${col};font-weight:700">${fmt(s)}%</div>
    <div style="font-size:9px;color:#64748B;text-transform:uppercase;letter-spacing:2px">${lbl}</div>
  </div>`;
}

// ── VIEWS ──────────────────────────────────────────────────────────────────────
function renderDash() {
  const l=hist[hist.length-1], p=hist[hist.length-2];
  const best=hist.reduce((b,h)=>(!b||h.muscleMass>b.muscleMass)?h:b,null);
  if (!l) return `<div class="card" style="text-align:center;padding:40px">
    <div style="font-size:40px;margin-bottom:12px">📊</div>
    <div style="color:#64748B;margin-bottom:16px">No hay evaluaciones aún</div>
    <button class="btn primary" onclick="nav('add')">+ Agregar primera evaluación</button>
  </div>`;

  const sd = pctDiff(l.inBodyScore,p?.inBodyScore,"up");
  let html = `<div class="section fade">
  <div class="card" style="display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center">
    <div>
      <div style="font-size:10px;color:#64748B;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">${dfull(l.date)}</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <span style="font-family:'JetBrains Mono',monospace;font-size:40px;color:#00D4FF;font-weight:700;line-height:1">${l.inBodyScore??"—"}</span>
        <span style="font-size:12px;color:#64748B">pts Score</span>
        ${sd?badge(sd.delta,sd.positive):""}
      </div>
      <div style="font-size:12px;color:#64748B;line-height:1.8">
        Peso: <span style="color:#E2E8F0;font-family:'JetBrains Mono',monospace">${fmt(l.weight)} kg</span> ·
        Músculo: <span style="color:#818CF8;font-family:'JetBrains Mono',monospace">${fmt(l.muscleMass)} kg</span><br>
        Grasa: <span style="color:#F97316;font-family:'JetBrains Mono',monospace">${fmt(l.fatMass)} kg</span> ·
        Visceral: <span style="color:#EF4444;font-family:'JetBrains Mono',monospace">niv. ${l.visceralFat}</span>
      </div>
      ${l.notes?`<div style="margin-top:10px;font-size:11px;color:#64748B;border-left:2px solid #00D4FF;padding-left:8px;font-style:italic">${l.notes}</div>`:""}
    </div>
    ${gaugeHTML(l.fatPercent)}
  </div>`;

  if (best && best.date !== l.date) {
    html += `<div class="card" style="border-color:#818CF8;background:#818CF811;display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">🏆</span>
      <div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#818CF8">MEJOR MOMENTO — ${dfull(best.date)}</div>
        <div style="font-size:11px;color:#64748B">Músculo: ${fmt(best.muscleMass)} kg · %Grasa: ${fmt(best.fatPercent)}%</div>
      </div>
    </div>`;
  }

  html += `<div class="kpi-grid">`;
  FIELDS.forEach(f => {
    const val=l[f.key], d=pctDiff(l[f.key],p?.[f.key],f.good);
    html += `<div class="kpi" style="${chartKey===f.key?`border-color:${f.color};box-shadow:0 0 0 1px ${f.color}44`:""}" onclick="setCK('${f.key}')">
      <div class="kpi-label">${f.label}</div>
      <div class="kpi-val" style="color:${f.color}">${fmt(val)}<span class="kpi-unit">${f.unit}</span></div>
      ${d?badge(d.delta,d.positive):""}
    </div>`;
  });
  html += `</div>`;

  // Mini chart
  if (hist.length > 1) {
    html += `<div class="card">
      <div style="font-size:10px;color:#64748B;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">MÚSCULO vs % GRASA</div>
      <div class="chart-wrap"><canvas id="miniChart"></canvas></div>
    </div>`;
  }

  // Comparativa
  if (l && p) {
    html += `<div class="card">
      <div style="font-size:10px;color:#64748B;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">COMPARATIVA ${dlabel(p.date)} → ${dlabel(l.date)}</div>`;
    FIELDS.forEach(f => {
      const vC=l[f.key],vP=p[f.key];
      if(!vC||!vP||isNaN(vC)||isNaN(vP)) return;
      const d=pctDiff(vC,vP,f.good),bw=Math.min(Math.abs(vC-vP)/Math.abs(vP)*100*8,100);
      html += `<div class="cmp-row">
        <span style="font-size:11px;color:#64748B">${f.label}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${bw}%;background:${d?.positive?"#22C55E":"#EF4444"}"></div></div>
        ${d?badge(d.delta,d.positive):""}
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function renderChart() {
  const af = FIELDS.find(f=>f.key===chartKey)||FIELDS[0];
  const l = hist[hist.length-1];
  const proj = project(chartKey, 3);

  let html = `<div class="section fade">
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">`;
  FIELDS.forEach(f => {
    html += `<button class="btn sm" style="border-color:${f.color};color:${chartKey===f.key?'#0B0F1A':f.color};background:${chartKey===f.key?f.color:'transparent'}" onclick="setCK('${f.key}')">${f.label}</button>`;
  });
  html += `</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:26px;color:${af.color};font-weight:700">${fmt(l?.[chartKey])} <span style="font-size:13px;color:#64748B">${af.unit}</span></div>
        <div style="font-size:11px;color:#64748B">${af.label} · última evaluación</div>
      </div>
      ${proj.length?`<div style="text-align:right">
        <div style="font-size:9px;color:#64748B;text-transform:uppercase;letter-spacing:1px">Proyección +3m</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:18px;color:#64748B">${fmt(proj[proj.length-1]?.val)} ${af.unit}</div>
      </div>`:""}
    </div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>`;

  // Delta chart
  if (hist.length > 1) {
    html += `<div class="card">
      <div style="font-size:10px;color:#64748B;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Δ CAMBIO SESIÓN A SESIÓN</div>
      <div class="chart-wrap" style="height:150px"><canvas id="deltaChart"></canvas></div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

function renderHist() {
  if (!hist.length) return `<div class="card" style="text-align:center;padding:32px;color:#64748B">Sin evaluaciones</div>`;
  let html = `<div class="section fade">`;
  [...hist].reverse().forEach((h,ri) => {
    const idx=hist.length-1-ri, p=idx>0?hist[idx-1]:null;
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#00D4FF">${dfull(h.date)}</div>
          ${h.inBodyScore?`<div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#22C55E">Score ${h.inBodyScore} pts</div>`:""}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn sm" onclick="doEdit(${idx})">Editar</button>
          <button class="btn sm danger" onclick="doDel(${idx})">×</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">`;
    FIELDS.forEach(f => {
      if (!h[f.key] && h[f.key]!==0) return;
      const d=p?pctDiff(h[f.key],p[f.key],f.good):null;
      html += `<div style="font-family:'JetBrains Mono',monospace;font-size:11px">
        <span style="color:#64748B">${f.label}: </span>
        <span style="color:${f.color}">${fmt(h[f.key])}${f.unit}</span>
        ${d?badge(d.delta,d.positive):""}
      </div>`;
    });
    html += `</div>`;
    if (h.notes) html += `<div style="margin-top:8px;font-size:11px;color:#64748B;border-left:2px solid #00D4FF;padding-left:8px;font-style:italic">${h.notes}</div>`;
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

// ── FORM STATE ──────────────────────────────────────────────────────────────────
const EMPTY_FORM = {date:new Date().toISOString().slice(0,10),weight:"",muscleMass:"",fatMass:"",fatPercent:"",waterLiters:"",boneMass:"",bmi:"",visceralFat:"",bmr:"",inBodyScore:"",notes:""};
let currentForm = {...EMPTY_FORM};

function renderAdd() {
  let html = `<div class="section fade">`;
  if (editIdx===null) {
    html += `<div class="card" style="border-color:#00D4FF55;background:#00D4FF08">
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#00D4FF;letter-spacing:1px;margin-bottom:8px">📄 IMPORTAR DESDE PDF</div>
      <div style="font-size:12px;color:#64748B;margin-bottom:12px;line-height:1.6">Sube el PDF en el <strong style="color:#E2E8F0">chat de Claude</strong> → pide que lo lea → copia el JSON → pégalo aquí.</div>
      <button class="btn sm primary" onclick="openImport()">📋 Pegar JSON del InBody</button>
    </div>`;
  }
  html += `<div class="card">
    <div style="font-size:11px;color:#64748B;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px">${editIdx!==null?"EDITAR EVALUACIÓN":"INGRESAR MANUALMENTE"}</div>
    <div class="form-grid">
      <div class="form-full">
        <label>Fecha *</label>
        <input type="date" id="f-date" value="${currentForm.date}"/>
      </div>`;
  FIELDS.forEach(f => {
    html += `<div>
      <label>${f.label}${f.unit?" ("+f.unit+")":""}</label>
      <input type="number" step="0.1" placeholder="—" id="f-${f.key}" value="${currentForm[f.key]??""}" style="border-color:${currentForm[f.key]?f.color+"88":"#1F2D45"}"/>
    </div>`;
  });
  html += `<div class="form-full">
        <label>Notas</label>
        <textarea id="f-notes" rows="3" placeholder="Comentarios del nutricionista…">${currentForm.notes||""}</textarea>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:14px;justify-content:flex-end">
      <button class="btn" onclick="cancelForm()">Cancelar</button>
      <button class="btn primary" onclick="submitForm()">${editIdx!==null?"Actualizar":"Guardar"}</button>
    </div>
  </div></div>`;
  return html;
}

// ── IMPORT MODAL ───────────────────────────────────────────────────────────────
let importPreview = null;
function openImport() {
  importPreview = null;
  const bg = document.createElement("div");
  bg.className = "modal-bg"; bg.id = "import-modal";
  bg.innerHTML = `<div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#00D4FF;font-weight:700">IMPORTAR INBODY</div>
      <button onclick="closeImport()" style="background:none;border:none;color:#64748B;font-size:24px;padding:4px">×</button>
    </div>
    <div style="background:#131929;border-radius:12px;padding:14px;margin-bottom:14px">
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#00D4FF;margin-bottom:10px;letter-spacing:1px">CÓMO IMPORTAR</div>
      ${[["1","Sube el PDF en el chat de Claude","botón 📎 en la conversación"],
         ["2","Escribe: 'léeme este InBody'","Claude extrae todos los datos"],
         ["3","Copia el JSON que te responde",""],
         ["4","Pégalo abajo y confirma",""]
        ].map(([n,t,d])=>`<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px">
          <div style="background:#00D4FF;color:#0B0F1A;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0">${n}</div>
          <div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#E2E8F0">${t}</div>${d?`<div style="font-size:11px;color:#64748B">${d}</div>`:""}</div>
        </div>`).join("")}
    </div>
    <label style="font-size:11px;color:#64748B;letter-spacing:1px;display:block;margin-bottom:6px">PEGA EL JSON AQUÍ</label>
    <textarea id="import-json" rows="6" placeholder='{"date":"2026-04-23","weight":93.2,"muscleMass":36.8,...}' style="width:100%;background:#131929;border:1px solid #1F2D45;border-radius:10px;color:#E2E8F0;font-family:'JetBrains Mono',monospace;font-size:12px;padding:12px 14px;margin-bottom:10px"></textarea>
    <div id="import-err" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#EF4444;margin-bottom:10px;display:none"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn" onclick="closeImport()">Cancelar</button>
      <button class="btn primary" onclick="parseImport()">Revisar →</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
}

function parseImport() {
  const raw = document.getElementById("import-json").value;
  const errEl = document.getElementById("import-err");
  try {
    const s = raw.trim().replace(/```(?:json)?/gi,"").trim();
    const m = s.match(/\{[\s\S]*\}/);
    if (!m) throw new Error("No se encontró JSON válido");
    const p = JSON.parse(m[0]);
    if (!p.date && !p.weight) throw new Error("JSON inválido (falta fecha o peso)");
    importPreview = p;
    // Show preview
    const modal = document.querySelector(".modal");
    modal.innerHTML = `<div class="modal-handle"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#00D4FF;font-weight:700">IMPORTAR INBODY</div>
        <button onclick="closeImport()" style="background:none;border:none;color:#64748B;font-size:24px;padding:4px">×</button>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <span style="font-size:22px">✅</span>
        <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#22C55E;font-weight:600">Datos listos para guardar</div>
      </div>
      <div style="background:#131929;border-radius:10px;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:14px">
        ${[["Fecha",p.date],["Peso",p.weight!=null?p.weight+" kg":null],["Músculo",p.muscleMass!=null?p.muscleMass+" kg":null],
           ["% Grasa",p.fatPercent!=null?p.fatPercent+"%":null],["Grasa",p.fatMass!=null?p.fatMass+" kg":null],
           ["Agua",p.waterLiters!=null?p.waterLiters+" L":null],["Visceral",p.visceralFat!=null?"Niv. "+p.visceralFat:null],
           ["Metabolismo",p.bmr!=null?p.bmr+" kcal":null],["Score",p.inBodyScore!=null?p.inBodyScore+" pts":null]
          ].filter(([,v])=>v!=null).map(([l,v])=>`<div><div style="font-size:10px;color:#64748B;margin-bottom:2px">${l}</div><div style="font-family:'JetBrains Mono',monospace;font-size:13px">${v}</div></div>`).join("")}
      </div>
      ${p.notes?`<div style="font-size:12px;color:#64748B;font-style:italic;border-left:2px solid #00D4FF;padding-left:10px;margin-bottom:14px">${p.notes}</div>`:""}
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn" onclick="closeImport();openImport()">← Editar</button>
        <button class="btn success primary" onclick="confirmImport()">✓ Añadir</button>
      </div>`;
  } catch(e) {
    errEl.textContent = "❌ " + e.message;
    errEl.style.display = "block";
  }
}

function confirmImport() {
  if (!importPreview) return;
  const p = importPreview;
  const entry = {
    date:p.date||new Date().toISOString().slice(0,10),
    weight:p.weight??null, muscleMass:p.muscleMass??null, fatMass:p.fatMass??null,
    fatPercent:p.fatPercent??null, waterLiters:p.waterLiters??null, boneMass:p.boneMass??null,
    bmi:p.bmi??null, visceralFat:p.visceralFat??null, bmr:p.bmr??null,
    inBodyScore:p.inBodyScore??null, notes:p.notes||"Importado desde PDF"
  };
  hist = [...hist, entry].sort((a,b)=>a.date.localeCompare(b.date));
  save(); closeImport(); nav("dash"); showToast("✓ InBody importado");
}

function closeImport() {
  const el = document.getElementById("import-modal");
  if (el) el.remove();
}

// ── FORM ACTIONS ───────────────────────────────────────────────────────────────
function readForm() {
  const get = id => document.getElementById(id)?.value||"";
  currentForm.date = get("f-date");
  FIELDS.forEach(f => { currentForm[f.key] = get("f-"+f.key); });
  currentForm.notes = get("f-notes");
}

function submitForm() {
  readForm();
  if (!currentForm.date) { showToast("Agrega una fecha",false); return; }
  const entry = {notes:currentForm.notes||"", date:currentForm.date};
  FIELDS.forEach(f => { entry[f.key] = currentForm[f.key]===""||currentForm[f.key]==null ? null : parseFloat(currentForm[f.key]); });
  if (editIdx!==null) hist[editIdx]=entry;
  else hist = [...hist, entry].sort((a,b)=>a.date.localeCompare(b.date));
  save(); editIdx=null; currentForm={...EMPTY_FORM};
  nav("dash"); showToast(editIdx!==null?"Actualizado ✓":"Guardado ✓");
}

function cancelForm() { editIdx=null; currentForm={...EMPTY_FORM}; nav("dash"); }
function doEdit(i) { editIdx=i; currentForm=Object.fromEntries(Object.keys(EMPTY_FORM).map(k=>[k,hist[i][k]??''])); nav("add"); }
function doDel(i) { if(!confirm("¿Eliminar esta evaluación?")) return; hist.splice(i,1); save(); render(); showToast("Eliminado"); }
function setCK(k) { chartKey=k; if(activeChart){activeChart.destroy();activeChart=null;} nav("chart"); }

// ── CHART INIT ─────────────────────────────────────────────────────────────────
function initCharts() {
  const labels = hist.map(h=>dlabel(h.date));

  // Mini chart (dash)
  const mc = document.getElementById("miniChart");
  if (mc) {
    if (activeChart) activeChart.destroy();
    activeChart = new Chart(mc, {
      type:"line",
      data:{
        labels,
        datasets:[
          {label:"Músculo (kg)",data:hist.map(h=>h.muscleMass),borderColor:"#818CF8",backgroundColor:"#818CF822",tension:.3,pointRadius:4,fill:true},
          {label:"% Grasa",data:hist.map(h=>h.fatPercent),borderColor:"#F97316",backgroundColor:"#F9731622",tension:.3,pointRadius:4,fill:true},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#64748B",font:{size:10}}}},scales:{x:{ticks:{color:"#64748B",font:{size:10}},grid:{color:"#1F2D45"}},y:{ticks:{color:"#64748B",font:{size:10}},grid:{color:"#1F2D45"}}}}
    });
  }

  // Main chart (chart view)
  const mch = document.getElementById("mainChart");
  if (mch) {
    if (activeChart) activeChart.destroy();
    const af = FIELDS.find(f=>f.key===chartKey)||FIELDS[0];
    const proj = project(chartKey,3);
    const projLabels = proj.map(p=>dlabel(p.date));
    const allLabels = [...labels, ...projLabels];
    const realData = [...hist.map(h=>h[chartKey]??null), ...proj.map(()=>null)];
    const projData = [...hist.map(()=>null), ...proj.map(p=>p.val)];
    activeChart = new Chart(mch, {
      type:"line",
      data:{
        labels:allLabels,
        datasets:[
          {label:af.label,data:realData,borderColor:af.color,backgroundColor:af.color+"22",tension:.3,pointRadius:4,fill:true,spanGaps:false},
          {label:"Proyección",data:projData,borderColor:"#64748B",borderDash:[6,4],tension:.3,pointRadius:3,fill:false,spanGaps:false},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#64748B",font:{size:10}}}},scales:{x:{ticks:{color:"#64748B",font:{size:10}},grid:{color:"#1F2D45"}},y:{ticks:{color:"#64748B",font:{size:10}},grid:{color:"#1F2D45"}}}}
    });
  }

  // Delta chart
  const dc = document.getElementById("deltaChart");
  if (dc && hist.length>1) {
    const af=FIELDS.find(f=>f.key===chartKey)||FIELDS[0];
    const deltas=hist.slice(1).map((h,i)=>h[chartKey]!=null&&hist[i][chartKey]!=null?parseFloat((h[chartKey]-hist[i][chartKey]).toFixed(2)):0);
    const dLabels=hist.slice(1).map(h=>dlabel(h.date));
    new Chart(dc,{
      type:"bar",
      data:{labels:dLabels,datasets:[{label:"Δ Cambio",data:deltas,backgroundColor:deltas.map(d=>d>0?"#22C55E88":"#EF444488"),borderColor:deltas.map(d=>d>0?"#22C55E":"#EF4444"),borderWidth:1,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#64748B",font:{size:10}},grid:{color:"#1F2D45"}},y:{ticks:{color:"#64748B",font:{size:10}},grid:{color:"#1F2D45"}}}}
    });
  }
}

// ── RENDER ──────────────────────────────────────────────────────────────────────
function render() {
  document.getElementById("eval-count").textContent = hist.length+" evaluaciones";
  const content = document.getElementById("content");
  if (view==="dash")  content.innerHTML = renderDash();
  if (view==="chart") content.innerHTML = renderChart();
  if (view==="hist")  content.innerHTML = renderHist();
  if (view==="add")   content.innerHTML = renderAdd();
  // Init charts after DOM update
  requestAnimationFrame(() => initCharts());
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
load();
render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
